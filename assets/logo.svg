<!-- Copy this entire block and paste into your HTML or save as roll-dice-logo.svg -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 100" width="200" height="80" role="img" aria-label="Roll Dice logo">
  <defs>
    <!-- gold gradient -->
    <linearGradient id="goldGrad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#d4a017"/>
      <stop offset="60%" stop-color="#b8850d"/>
      <stop offset="100%" stop-color="#fce287"/>
    </linearGradient>

    <!-- soft drop shadow -->
    <filter id="softShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
      <feOffset in="blur" dx="0" dy="4" result="offsetBlur"/>
      <feMerge>
        <feMergeNode in="offsetBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Optional background rectangle (comment out if you want transparent bg) -->
  <!--
  <rect width="100%" height="100%" fill="#0E0E0E" rx="8"/>
  -->

  <!-- Text parts: "R"  and "ll Dice" -->
  <text x="8" y="78" font-family="Segoe UI, Roboto, Arial, sans-serif" font-size="56" font-weight="700" fill="#fce287">R</text>

  <!-- Dice (replaces the 'O') -->
  <g transform="translate( sixty , 20 )">
    <!-- using a named transform placeholder replaced below -->
  </g>

  <!-- Since some editors don't like the text 'sixty', we place the real dice group below with explicit coordinates -->
  <g transform="translate(60,20)" filter="url(#softShadow)">
    <!-- dice body -->
    <rect x="0" y="0" width="64" height="64" rx="12" ry="12" fill="url(#goldGrad)" stroke="#b07a09" stroke-width="1.5"/>
    <!-- pips - using dark charcoal for contrast -->
    <circle cx="16" cy="16" r="5.5" fill="#e0e0e0"/>
    <circle cx="48" cy="16" r="5.5" fill="#e0e0e0"/>
    <circle cx="16" cy="48" r="5.5" fill="#e0e0e0"/>
    <circle cx="48" cy="48" r="5.5" fill="#e0e0e0"/>
    <circle cx="32" cy="32" r="5.5" fill="#e0e0e0"/>
  </g>

  <!-- Remaining text after dice -->
  <text x="140" y="78" font-family="Segoe UI, Roboto, Arial, sans-serif" font-size="46" font-weight="700" fill="#fce287">ll Dice</text>

  <!-- small tagline (optional) - remove or edit -->
  <!-- <text x="8" y="105" font-family="Segoe UI, Roboto, Arial, sans-serif" font-size="12" fill="#6b6b6b">Premium roll dice</text> -->
</svg>
